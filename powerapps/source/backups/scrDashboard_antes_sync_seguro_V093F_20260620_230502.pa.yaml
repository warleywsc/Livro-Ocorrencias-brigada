                        Width: =Parent.Width - Parent.PaddingLeft - Parent.PaddingRight
                  - btnModalPendenciaConcluir:
                      Control: Classic/Button@2.2.0
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        Color: =Color.White
                        DisabledBorderColor: =RGBA(0, 0, 0, 0)
                        DisabledColor: =RGBA(161, 159, 157, 1)
                        DisabledFill: =RGBA(242, 242, 241, 0)
                        Fill: =ColorValue("#357E76")
                        Font: =Font.'Segoe UI'
                        HoverBorderColor: =RGBA(0, 0, 0, 0)
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =RGBA(16, 110, 190, 1)
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        OnSelect: |-
                          =If(
                              IsBlank(varPendenciaSelecionada),
                              Notify(
                                  "Selecione uma pendência antes de concluir.",
                                  NotificationType.Error
                              ),

                              varPendenciaSelecionada.StatusPendencia.Value = "Concluída",
                              Notify(
                                  "Esta pendência já está concluída.",
                                  NotificationType.Information
                              ),

                              IsBlank(Trim(txtModalPendenciaConclusao.Text)),
                              SetFocus(txtModalPendenciaConclusao);
                              Notify(
                                  "Informe a solução/conclusão da pendência.",
                                  NotificationType.Error
                              ),

                              Set(
                                  varTextoConclusaoPendencia,
                                  "Conclusão em " &
                                  Text(
                                      Now(),
                                      "[$-pt-BR]dd/mm/yyyy hh:mm"
                                  ) &
                                  " por " &
                                  User().FullName &
                                  ": " &
                                  Trim(txtModalPendenciaConclusao.Text)
                              );

                              Set(
                                  varPendenciaSelecionada,
                                  Patch(
                                      PendenciasOperacionais,
                                      varPendenciaSelecionada,
                                      {
                                          StatusPendencia: {
                                              Value: "Concluída"
                                          },
                                          Observacoes:
                                              Coalesce(
                                                  varPendenciaSelecionada.Observacoes,
                                                  ""
                                              ) &
                                              If(
                                                  IsBlank(varPendenciaSelecionada.Observacoes),
                                                  "",
                                                  Char(10) & Char(10)
                                              ) &
                                              varTextoConclusaoPendencia
                                      }
                                  )
                              );

                              Set(
                                  varOcorrenciaOrigemPendencia,
                                  LookUp(
                                      Ocorrencias,
                                      PendenciaGerada.Id = varPendenciaSelecionada.ID
                                  )
                              );

                              If(
                                  !IsBlank(varOcorrenciaOrigemPendencia),
                                  Patch(
                                      Ocorrencias,
                                      varOcorrenciaOrigemPendencia,
                                      {
                                          Observacoes:
                                              Coalesce(
                                                  varOcorrenciaOrigemPendencia.Observacoes,
                                                  ""
                                              ) &
                                              If(
                                                  IsBlank(varOcorrenciaOrigemPendencia.Observacoes),
                                                  "",
                                                  Char(10) & Char(10)
                                              ) &
                                              "Pendência " &
                                              Coalesce(
                                                  varPendenciaSelecionada.NumeroPendencia,
                                                  varPendenciaSelecionada.Title
                                              ) &
                                              " concluída em " &
                                              Text(
                                                  Now(),
                                                  "[$-pt-BR]dd/mm/yyyy hh:mm"
                                              ) &
                                              " por " &
                                              User().FullName &
                                              "."
                                      }
                                  )
                              );

                              Refresh(PendenciasOperacionais);
                              Refresh(Ocorrencias);

                              Reset(txtModalPendenciaConclusao);
                              Reset(galPendenciasPrincipal);

                              Notify(
                                  "Pendência concluída com sucesso: " &
                                  Coalesce(
                                      varPendenciaSelecionada.NumeroPendencia,
                                      varPendenciaSelecionada.Title
                                  ),
                                  NotificationType.Success
                              )
                          )
                        PressedBorderColor: =RGBA(0, 69, 120, 1)
                        PressedColor: =RGBA(255, 255, 255, 1)
                        PressedFill: =RGBA(16, 110, 190, 1)
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Text: ="Concluir pendência"
                        Visible: |-
                          =!IsBlank(varPendenciaSelecionada) And
