                  - btnModalNovaPendenciaSalvar:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        Color: =Color.White
                        DisabledBorderColor: =RGBA(0, 0, 0, 0)
                        DisabledColor: =RGBA(161, 159, 157, 1)
                        DisabledFill: =RGBA(242, 242, 241, 0)
                        Fill: =ColorValue("#357E76")
                        Font: =Font.'Segoe UI'
                        HoverBorderColor: =RGBA(0, 0, 0, 0)
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =RGBA(16, 110, 190, 1)
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        OnSelect: |-
                          =If(
                              IsBlank(ddModalNovaPendenciaPostoServico.Selected.Value),
                              Notify(
                                  "Informe o posto de serviço.",
                                  NotificationType.Error
                              ),

                              IsBlank(ddModalNovaPendenciaPrioridade.Selected.Value),
                              Notify(
                                  "Informe a prioridade da pendência.",
                                  NotificationType.Error
                              ),

                              IsBlank(Trim(txtModalNovaPendenciaLocal.Text)),
                              SetFocus(txtModalNovaPendenciaLocal);
                              Notify(
                                  "Informe o local da pendência.",
                                  NotificationType.Error
                              ),

                              IsBlank(Trim(txtModalNovaPendenciaDescricao.Text)),
                              SetFocus(txtModalNovaPendenciaDescricao);
                              Notify(
                                  "Informe a descrição da pendência.",
                                  NotificationType.Error
                              ),

                              Set(
                                  varNumeroPendenciaTemporario,
                                  "PEN-PENDENTE-" &
                                  Upper(
                                      Left(
                                          Substitute(
                                              Text(GUID()),
                                              "-",
                                              ""
                                          ),
                                          8
                                      )
                                  )
                              );

                              Set(
                                  varPendenciaSalva,
                                  Patch(
                                      PendenciasOperacionais,
                                      Defaults(PendenciasOperacionais),
                                      {
                                          Title: varNumeroPendenciaTemporario,
                                          NumeroPendencia: varNumeroPendenciaTemporario,
                                          PlantaoOrigem: {
                                              '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedReference",
                                              Id: varPlantaoAtual.ID,
                                              Value: varPlantaoAtual.Title
                                          },
                                          OrigemPendencia: {
                                              Value: "Manual"
                                          },
                                          Descricao: Trim(txtModalNovaPendenciaDescricao.Text),
                                          PostoServico: {
                                              Value: ddModalNovaPendenciaPostoServico.Selected.Value
                                          },
                                          LocalRegistro: Trim(txtModalNovaPendenciaLocal.Text),
                                          PendenciaComLocalEspecifico: !IsBlank(Trim(txtModalNovaPendenciaLocal.Text)),
                                          Prioridade: {
                                              Value: ddModalNovaPendenciaPrioridade.Selected.Value
                                          },
                                          StatusPendencia: {
                                              Value: "Aberta"
                                          },
                                          ResponsavelAcompanhamento: varPlantaoAtual.LiderResponsavelAtual,
                                          DataAbertura: Now(),
                                          Observacoes:
                                              "Pendência manual criada pelo aplicativo em " &
                                              Text(
                                                  Now(),
                                                  "[$-pt-BR]dd/mm/yyyy hh:mm"
                                              ) &
                                              " por " &
                                              User().FullName &
                                              If(
                                                  IsBlank(Trim(txtModalNovaPendenciaObservacoes.Text)),
                                                  ".",
                                                  "." &
                                                  Char(10) &
                                                  Char(10) &
                                                  "Observações iniciais: " &
                                                  Trim(txtModalNovaPendenciaObservacoes.Text)
                                              )
                                      }
                                  )
                              );

                              Set(
                                  varNumeroPendenciaDefinitivo,
                                  "PEN-" & Text(varPendenciaSalva.ID, "000000")
                              );

                              Set(
                                  varPendenciaSalva,
                                  Patch(
                                      PendenciasOperacionais,
                                      varPendenciaSalva,
                                      {
                                          Title: varNumeroPendenciaDefinitivo,
                                          NumeroPendencia: varNumeroPendenciaDefinitivo
                                      }
                                  )
                              );

                              Set(varPendenciaSelecionada, varPendenciaSalva);

                              Refresh(PendenciasOperacionais);

                              Reset(galPendenciasPrincipal);

                              Reset(txtModalNovaPendenciaLocal);
                              Reset(ddModalNovaPendenciaPostoServico);
                              Reset(ddModalNovaPendenciaPrioridade);
                              Reset(txtModalNovaPendenciaDescricao);
                              Reset(txtModalNovaPendenciaObservacoes);

                              Set(varExibirModalNovaPendencia, false);

                              Notify(
                                  "Pendência salva com sucesso: " & varNumeroPendenciaDefinitivo,
                                  NotificationType.Success
                              )
                          )
