                        LayoutMinWidth: =16
                        OnSelect: |-
                          =If(
                              IsBlank(varOcorrenciaSelecionada),
                              Notify(
                                  "Selecione uma ocorrência antes de gerar pendência.",
                                  NotificationType.Error
                              ),

                              Coalesce(varOcorrenciaSelecionada.GeraPendencia, false),
                              Notify(
                                  "Esta ocorrência já possui pendência gerada.",
                                  NotificationType.Information
                              ),

                              Set(
                                  varNumeroPendenciaTemporario,
                                  "PEN-PENDENTE-" &
                                  Upper(
                                      Left(
                                          Substitute(
                                              Text(GUID()),
                                              "-",
                                              ""
                                          ),
                                          8
                                      )
                                  )
                              );

                              Set(
                                  varPendenciaGerada,
                                  Patch(
                                      PendenciasOperacionais,
                                      Defaults(PendenciasOperacionais),
                                      {
                                          Title: varNumeroPendenciaTemporario,
                                          NumeroPendencia: varNumeroPendenciaTemporario,
                                          PlantaoOrigem: {
                                              '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedReference",
                                              Id: varPlantaoAtual.ID,
                                              Value: varPlantaoAtual.Title
                                          },
                                          OrigemPendencia: {
                                              Value: "Ocorrência"
                                          },
                                          Descricao:
                                              "Pendência gerada a partir da ocorrência " &
                                              Coalesce(
                                                  varOcorrenciaSelecionada.NumeroOcorrencia,
                                                  varOcorrenciaSelecionada.Title
                                              ) &
                                              Char(10) &
                                              Char(10) &
                                              "Descrição da ocorrência: " &
                                              Coalesce(
                                                  varOcorrenciaSelecionada.Descricao,
                                                  "Sem descrição registrada."
                                              ) &
                                              Char(10) &
                                              Char(10) &
                                              "Ações tomadas até o momento: " &
                                              Coalesce(
                                                  varOcorrenciaSelecionada.AcoesTomadas,
                                                  "Sem ações registradas."
                                              ),
                                          PostoServico: {
                                              Value: varOcorrenciaSelecionada.PostoServico.Value
                                          },
                                          LocalRegistro: varOcorrenciaSelecionada.LocalRegistro,
                                          PendenciaComLocalEspecifico: !IsBlank(varOcorrenciaSelecionada.LocalRegistro),
                                          Prioridade: {
                                              Value: "Média"
                                          },
                                          StatusPendencia: {
                                              Value: "Aberta"
                                          },
                                          ResponsavelAcompanhamento: varOcorrenciaSelecionada.LiderResponsavelNoMomento,
                                          DataAbertura: Now(),
                                          Observacoes:
                                              "Pendência criada pelo aplicativo em " &
                                              Text(
                                                  Now(),
                                                  "[$-pt-BR]dd/mm/yyyy hh:mm"
                                              ) &
                                              " por " &
                                              User().FullName &
                                              "." &
                                              Char(10) &
                                              "Origem: " &
                                              Coalesce(
                                                  varOcorrenciaSelecionada.NumeroOcorrencia,
                                                  varOcorrenciaSelecionada.Title
                                              )
                                      }
                                  )
                              );

                              Set(
                                  varNumeroPendenciaDefinitivo,
                                  "PEN-" & Text(varPendenciaGerada.ID, "000000")
                              );

                              Set(
                                  varPendenciaGerada,
                                  Patch(
                                      PendenciasOperacionais,
                                      varPendenciaGerada,
                                      {
                                          Title: varNumeroPendenciaDefinitivo,
                                          NumeroPendencia: varNumeroPendenciaDefinitivo
                                      }
                                  )
                              );

                              Set(
                                  varOcorrenciaSelecionada,
                                  Patch(
                                      Ocorrencias,
                                      varOcorrenciaSelecionada,
                                      {
                                          GeraPendencia: true,
                                          PendenciaGerada: {
                                              '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedReference",
