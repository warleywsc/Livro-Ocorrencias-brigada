                                                  "[$-pt-BR]dd/mm/yyyy hh:mm"
                                              ) &
                                              " por " &
                                              User().FullName &
                                              "."
                                      }
                                  )
                              );

                              Refresh(PendenciasOperacionais);
                              Refresh(Ocorrencias);
                              Reset(galOcorrenciasPrincipal);

                              Notify(
                                  "Pendência gerada com sucesso: " & varNumeroPendenciaDefinitivo,
                                  NotificationType.Success
                              )
                          )
