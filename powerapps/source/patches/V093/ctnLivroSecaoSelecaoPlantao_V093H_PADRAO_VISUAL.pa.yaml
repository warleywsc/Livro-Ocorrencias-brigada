                                                      )
                                                  );
                                                  Select(btnTecnicoRecalcularPermissoesPlantao);
                                                  Notify(
                                                      "Dados do plantão atualizados.",
                                                      NotificationType.Success
                                                  )
                                                PressedBorderColor: =RGBA(0, 69, 120, 1)
                                                PressedColor: =Color.White
                                                PressedFill: =RGBA(16, 110, 190, 1)
                                                RadiusBottomLeft: =0
                                                RadiusBottomRight: =0
                                                RadiusTopLeft: =0
                                                RadiusTopRight: =0
                                                Size: =12
                                                Text: ="Atualizar"
                                                Width: =130
                                    - lblSelecaoPlantaoStatus:
                                        Control: Label@2.5.1
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Stretch
                                          BorderColor: =ColorValue("#D6E4EC")
                                          BorderThickness: =1
                                          Color: =ColorValue("#374151")
                                          Fill: =Color.White
                                          Font: =Font.'Segoe UI'
                                          Height: =58
                                          LayoutMinHeight: =16
                                          LayoutMinWidth: =16
                                          PaddingBottom: =6
                                          PaddingLeft: =10
                                          PaddingRight: =10
                                          PaddingTop: =6
                                          Size: =11
                                          Text: |-
                                            =If(
                                                IsBlank(varPlantaoAtual.ID),
