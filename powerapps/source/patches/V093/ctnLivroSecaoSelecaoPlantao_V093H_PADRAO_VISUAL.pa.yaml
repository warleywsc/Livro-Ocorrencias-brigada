                                                  =If(
                                                      varUsuarioAtualEhAdministradorOuSupervisor ||
                                                      varPerfilAcessoNormalizado = "Lider",
                                                      ColorValue("#1F7A4D"),
                                                      ColorValue("#9CA3AF")
                                                  )
