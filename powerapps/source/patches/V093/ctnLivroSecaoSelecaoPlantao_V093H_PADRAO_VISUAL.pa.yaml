                                                " | Turno: " &
                                                Coalesce(varPlantaoAtual.Turno.Value, "não informado") &
                                                " | Posto: " &
                                                Coalesce(varPlantaoAtual.PostoServico.Value, "não informado") &
                                                " | Status: " &
                                                Coalesce(varPlantaoAtual.StatusLivro.Value, "não informado")
                                            )
                                          Width: =Parent.Width - Parent.PaddingLeft - Parent.PaddingRight
