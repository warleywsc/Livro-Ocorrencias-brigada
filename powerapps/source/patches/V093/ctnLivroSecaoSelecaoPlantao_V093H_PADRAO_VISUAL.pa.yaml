                                                              Upper(
                                                                  Substitute(
                                                                      Substitute(
                                                                          Substitute(
                                                                              ddSelecaoPlantaoTurno.Selected.Value,
                                                                              " ",
                                                                              ""
                                                                          ),
                                                                          "ã",
                                                                          "a"
                                                                      ),
                                                                      "Ã",
                                                                      "A"
                                                                  )
                                                              ) &
                                                              "-" &
                                                              Switch(
                                                                  ddSelecaoPlantaoPostoServico.Selected.Value,
                                                                  "Brigada de Incêndio",
                                                                  "BI",
                                                                  "Angra 1",
                                                                  "A1",
                                                                  "Angra 2",
                                                                  "A2",
                                                                  "Angra 3",
                                                                  "A3",
                                                                  "POSTO"
                                                              ) &
                                                              If(
                                                                  ddSelecaoPlantaoExtra.Selected.Value = "Sim",
                                                                  "-EXTRA",
                                                                  ""
                                                              )
                                                          );
