- ctnLivroSecaoSelecaoPlantao:
    Control: GroupContainer@1.5.0
    Variant: AutoLayout
    Properties:
      AlignInContainer: =AlignInContainer.SetByContainer
      BorderColor: =ColorValue("#D6E4EC")
      BorderThickness: =1
      Fill: =ColorValue("#F9FAFB")
      FillPortions: =0
      Height: |-
        =Max(
            Self.PaddingTop + Self.PaddingBottom +
            lblLivroSecaoSelecaoPlantaoTitulo.Height +
            ctnLivroSelecaoPlantaoResumo.Height +
            ctnLivroSelecaoPlantaoLinha.Height +
            ctnLivroSelecaoPlantaoAcoes.Height +
            lblLivroSelecaoPlantaoStatus.Height +
            (4 * Self.LayoutGap),
            338
        )
      LayoutAlignItems: =LayoutAlignItems.Stretch
      LayoutDirection: =LayoutDirection.Vertical
      LayoutGap: =10
      LayoutMinHeight: =16
      LayoutMinWidth: =16
      PaddingBottom: =12
      PaddingLeft: =16
      PaddingRight: =16
      PaddingTop: =12
      RadiusBottomLeft: =8
      RadiusBottomRight: =8
      RadiusTopLeft: =8
      RadiusTopRight: =8
      Width: =Parent.Width
    Children:
      - lblLivroSecaoSelecaoPlantaoTitulo:
          Control: Label@2.5.1
          Properties:
            AlignInContainer: =AlignInContainer.Stretch
            Color: =ColorValue("#0B5F8A")
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =36
            LayoutMinHeight: =16
            LayoutMinWidth: =16
            Size: =16
            Text: ="0. Seleção do Plantão"
            Width: =Parent.Width - Parent.PaddingLeft - Parent.PaddingRight

      - ctnLivroSelecaoPlantaoResumo:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            AlignInContainer: =AlignInContainer.Stretch
            FillPortions: =0
            Height: |-
              =Max(
                  Self.PaddingTop + Self.PaddingBottom +
                  lblLivroSelecaoPlantaoResumo.Height,
                  76
              )
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =4
            LayoutMinHeight: =16
            LayoutMinWidth: =16
            PaddingBottom: =8
            PaddingLeft: =8
            PaddingRight: =8
            PaddingTop: =8
            Width: =Parent.Width - Parent.PaddingLeft - Parent.PaddingRight
          Children:
            - lblLivroSelecaoPlantaoResumo:
                Control: Label@2.5.1
                Properties:
                  AlignInContainer: =AlignInContainer.Stretch
                  Color: =ColorValue("#374151")
                  Font: =Font.'Segoe UI'
                  FontWeight: =FontWeight.Semibold
                  Height: =52
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  Size: =11
                  Text: ="Selecione a data, o turno e o posto de serviço para carregar um Livro do Plantão existente ou criar um novo registro."
                  Width: =Parent.Width

      - ctnLivroSelecaoPlantaoLinha:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            AlignInContainer: =AlignInContainer.Stretch
            FillPortions: =0
            Height: |-
              =Max(
                  Self.PaddingTop + Self.PaddingBottom +
                  Max(
                      ctnCampoSelecaoPlantaoData.Height,
                      ctnCampoSelecaoPlantaoTurno.Height,
                      ctnCampoSelecaoPlantaoPostoServico.Height,
                      ctnCampoSelecaoPlantaoExtra.Height
                  ),
                  82
              )
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutMinHeight: =16
            LayoutMinWidth: =16
            PaddingBottom: =0
            PaddingLeft: =8
            PaddingRight: =8
            PaddingTop: =0
            Width: =Parent.Width - Parent.PaddingLeft - Parent.PaddingRight
          Children:
            - ctnCampoSelecaoPlantaoData:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  Height: =Max(Self.PaddingTop + Self.PaddingBottom + 24 + 42 + Self.LayoutGap, 82)
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =2
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  PaddingBottom: =4
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =4
                  Width: =(Parent.Width - 36) / 4
                Children:
                  - lblSelecaoPlantaoData:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Color: =ColorValue("#374151")
                        Font: =Font.'Segoe UI'
                        FontWeight: =FontWeight.Semibold
                        Height: =24
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Size: =11
                        Text: ="Data"
                        Width: =Parent.Width
                  - dtpSelecaoPlantaoData:
                      Control: Classic/DatePicker@2.6.0
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        BorderColor: =ColorValue("#D6E4EC")
                        BorderThickness: =1
                        Color: =ColorValue("#1F2937")
                        DefaultDate: =Today()
                        DisplayMode: |-
                          =If(
                              varProcessandoLivroPlantao,
                              DisplayMode.View,
                              DisplayMode.Edit
                          )
                        Fill: =Color.White
                        Font: =Font.'Segoe UI'
                        Height: =42
                        IconBackground: =ColorValue("#0082BC")
                        IconFill: =Color.White
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Size: =11
                        Width: =Parent.Width

            - ctnCampoSelecaoPlantaoTurno:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  Height: =Max(Self.PaddingTop + Self.PaddingBottom + 24 + 42 + Self.LayoutGap, 82)
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =2
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  PaddingBottom: =4
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =4
                  Width: =(Parent.Width - 36) / 4
                Children:
                  - lblSelecaoPlantaoTurno:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Color: =ColorValue("#374151")
                        Font: =Font.'Segoe UI'
                        FontWeight: =FontWeight.Semibold
                        Height: =24
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Size: =11
                        Text: ="Turno"
                        Width: =Parent.Width
                  - ddSelecaoPlantaoTurno:
                      Control: Classic/DropDown@2.3.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        BorderColor: =ColorValue("#D6E4EC")
                        BorderThickness: =1
                        ChevronBackground: =ColorValue("#F9FAFB")
                        ChevronFill: =ColorValue("#1F2937")
                        Color: =ColorValue("#1F2937")
                        Default: ="A"
                        DisplayMode: |-
                          =If(
                              varProcessandoLivroPlantao,
                              DisplayMode.View,
                              DisplayMode.Edit
                          )
                        Fill: =ColorValue("#F9FAFB")
                        Font: =Font.'Segoe UI'
                        Height: =42
                        Items: =["A", "B", "C", "D", "ADM"]
                        Items.Value: =Value
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PaddingBottom: =5
                        PaddingLeft: =8
                        PaddingRight: =5
                        PaddingTop: =5
                        SelectionColor: =Color.White
                        SelectionFill: =ColorValue("#0082BC")
                        Size: =12
                        Width: =Parent.Width

            - ctnCampoSelecaoPlantaoPostoServico:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  Height: =Max(Self.PaddingTop + Self.PaddingBottom + 24 + 42 + Self.LayoutGap, 82)
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =2
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  PaddingBottom: =4
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =4
                  Width: =(Parent.Width - 36) / 4
                Children:
                  - lblSelecaoPlantaoPostoServico:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Color: =ColorValue("#374151")
                        Font: =Font.'Segoe UI'
                        FontWeight: =FontWeight.Semibold
                        Height: =24
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Size: =11
                        Text: ="Posto de Serviço"
                        Width: =Parent.Width
                  - ddSelecaoPlantaoPostoServico:
                      Control: Classic/DropDown@2.3.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        BorderColor: =ColorValue("#D6E4EC")
                        BorderThickness: =1
                        ChevronBackground: =ColorValue("#F9FAFB")
                        ChevronFill: =ColorValue("#1F2937")
                        Color: =ColorValue("#1F2937")
                        Default: ="Brigada de Incêndio"
                        DisplayMode: |-
                          =If(
                              varProcessandoLivroPlantao,
                              DisplayMode.View,
                              DisplayMode.Edit
                          )
                        Fill: =ColorValue("#F9FAFB")
                        Font: =Font.'Segoe UI'
                        Height: =42
                        Items: =["Angra 1", "Angra 2", "Angra 3", "Brigada de Incêndio"]
                        Items.Value: =Value
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PaddingBottom: =5
                        PaddingLeft: =8
                        PaddingRight: =5
                        PaddingTop: =5
                        SelectionColor: =Color.White
                        SelectionFill: =ColorValue("#0082BC")
                        Size: =12
                        Width: =Parent.Width

            - ctnCampoSelecaoPlantaoExtra:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  Height: =Max(Self.PaddingTop + Self.PaddingBottom + 24 + 42 + Self.LayoutGap, 82)
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =2
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  PaddingBottom: =4
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =4
                  Width: =(Parent.Width - 36) / 4
                Children:
                  - lblSelecaoPlantaoExtra:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Color: =ColorValue("#374151")
                        Font: =Font.'Segoe UI'
                        FontWeight: =FontWeight.Semibold
                        Height: =24
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Size: =11
                        Text: ="Plantão Extra"
                        Width: =Parent.Width
                  - ddSelecaoPlantaoExtra:
                      Control: Classic/DropDown@2.3.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        BorderColor: =ColorValue("#D6E4EC")
                        BorderThickness: =1
                        ChevronBackground: =ColorValue("#F9FAFB")
                        ChevronFill: =ColorValue("#1F2937")
                        Color: =ColorValue("#1F2937")
                        Default: ="Não"
                        DisplayMode: |-
                          =If(
                              varProcessandoLivroPlantao,
                              DisplayMode.View,
                              DisplayMode.Edit
                          )
                        Fill: =ColorValue("#F9FAFB")
                        Font: =Font.'Segoe UI'
                        Height: =42
                        Items: =["Não", "Sim"]
                        Items.Value: =Value
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PaddingBottom: =5
                        PaddingLeft: =8
                        PaddingRight: =5
                        PaddingTop: =5
                        SelectionColor: =Color.White
                        SelectionFill: =ColorValue("#0082BC")
                        Size: =12
                        Width: =Parent.Width

      - ctnLivroSelecaoPlantaoAcoes:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            AlignInContainer: =AlignInContainer.Stretch
            FillPortions: =0
            Height: |-
              =Max(
                  Self.PaddingTop + Self.PaddingBottom +
                  Max(
                      btnSelecaoPlantaoCarregar.Height,
                      btnSelecaoPlantaoCriar.Height
                  ),
                  76
              )
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutMinHeight: =16
            LayoutMinWidth: =16
            PaddingBottom: =8
            PaddingLeft: =8
            PaddingRight: =8
            PaddingTop: =8
            Width: =Parent.Width - Parent.PaddingLeft - Parent.PaddingRight
          Children:
            - btnSelecaoPlantaoCarregar:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  BorderColor: =ColorValue("#0082BC")
                  BorderThickness: =1
                  Color: =Color.White
                  DisplayMode: |-
                    =If(
                        varProcessandoLivroPlantao,
                        DisplayMode.View,
                        DisplayMode.Edit
                    )
                  Fill: |-
                    =If(
                        varProcessandoLivroPlantao,
                        ColorValue("#9CA3AF"),
                        ColorValue("#0082BC")
                    )
                  FillPortions: =1
                  Font: =Font.'Segoe UI'
                  FontWeight: =FontWeight.Semibold
                  Height: =52
                  HoverBorderColor: =ColorValue("#0B5F8A")
                  HoverColor: =Color.White
                  HoverFill: =ColorValue("#0B5F8A")
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  OnSelect: |-
                    =Set(varProcessandoLivroPlantao, true);
                    Refresh(Plantoes);
                    Set(
                        varCodigoPlantaoGerado,
                        Text(dtpSelecaoPlantaoData.SelectedDate, "yyyymmdd") &
                        "-" &
                        Substitute(ddSelecaoPlantaoPostoServico.Selected.Value, " ", "") &
                        "-" &
                        ddSelecaoPlantaoTurno.Selected.Value &
                        If(ddSelecaoPlantaoExtra.Selected.Value = "Sim", "-EXTRA", "")
                    );
                    Set(
                        varPlantaoAtual,
                        LookUp(
                            Plantoes,
                            CodigoPlantao = varCodigoPlantaoGerado
                        )
                    );
                    If(
                        IsBlank(varPlantaoAtual),
                        Notify(
                            "Nenhum Livro do Plantão encontrado para a seleção informada.",
                            NotificationType.Warning
                        ),
                        Notify(
                            "Livro do Plantão carregado com sucesso.",
                            NotificationType.Success
                        )
                    );
                    Select(btnTecnicoRecalcularPermissoesPlantao);
                    Set(varProcessandoLivroPlantao, false)
                  PaddingBottom: =8
                  PaddingLeft: =12
                  PaddingRight: =12
                  PaddingTop: =8
                  Size: =12
                  Text: ="Carregar"
                  Width: =(Parent.Width - 12) / 2

            - btnSelecaoPlantaoCriar:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  BorderColor: =ColorValue("#1F7A4D")
                  BorderThickness: =1
                  Color: =Color.White
                  DisplayMode: |-
                    =If(
                        varProcessandoLivroPlantao,
                        DisplayMode.View,
                        DisplayMode.Edit
                    )
                  Fill: |-
                    =If(
                        varProcessandoLivroPlantao,
                        ColorValue("#9CA3AF"),
                        ColorValue("#1F7A4D")
                    )
                  FillPortions: =1
                  Font: =Font.'Segoe UI'
                  FontWeight: =FontWeight.Semibold
                  Height: =52
                  HoverBorderColor: =ColorValue("#166534")
                  HoverColor: =Color.White
                  HoverFill: =ColorValue("#166534")
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  OnSelect: |-
                    =Set(varProcessandoLivroPlantao, true);
                    Refresh(Plantoes);
                    Set(
                        varCodigoPlantaoGerado,
                        Text(dtpSelecaoPlantaoData.SelectedDate, "yyyymmdd") &
                        "-" &
                        Substitute(ddSelecaoPlantaoPostoServico.Selected.Value, " ", "") &
                        "-" &
                        ddSelecaoPlantaoTurno.Selected.Value &
                        If(ddSelecaoPlantaoExtra.Selected.Value = "Sim", "-EXTRA", "")
                    );
                    Set(
                        varPlantaoExistente,
                        LookUp(
                            Plantoes,
                            CodigoPlantao = varCodigoPlantaoGerado
                        )
                    );
                    If(
                        !IsBlank(varPlantaoExistente),
                        Set(varPlantaoAtual, varPlantaoExistente);
                        Notify(
                            "Já existe Livro do Plantão para esta seleção. O registro existente foi carregado.",
                            NotificationType.Information
                        ),
                        IfError(
                            Set(
                                varPlantaoAtual,
                                Patch(
                                    Plantoes,
                                    Defaults(Plantoes),
                                    {
                                        Title: varCodigoPlantaoGerado,
                                        CodigoPlantao: varCodigoPlantaoGerado,
                                        DataPlantao: dtpSelecaoPlantaoData.SelectedDate,
                                        Turno: {Value: ddSelecaoPlantaoTurno.Selected.Value},
                                        PostoServico: {Value: ddSelecaoPlantaoPostoServico.Selected.Value},
                                        PlantaoExtra: ddSelecaoPlantaoExtra.Selected.Value = "Sim",
                                        StatusLivro: {Value: "Em preenchimento"},
                                        DataAbertura: Now(),
                                        LiderEscalado: {
                                            Claims: "i:0#.f|membership|" & Lower(User().Email),
                                            DisplayName: User().FullName,
                                            Email: Lower(User().Email)
                                        },
                                        LiderResponsavelAtual: {
                                            Claims: "i:0#.f|membership|" & Lower(User().Email),
                                            DisplayName: User().FullName,
                                            Email: Lower(User().Email)
                                        }
                                    }
                                )
                            ),
                            Notify(
                                "Erro ao criar Livro do Plantão: " & Coalesce(FirstError.Message, "erro não informado."),
                                NotificationType.Error
                            ),
                            Notify(
                                "Livro do Plantão criado com sucesso.",
                                NotificationType.Success
                            )
                        )
                    );
                    Select(btnTecnicoRecalcularPermissoesPlantao);
                    Set(varProcessandoLivroPlantao, false)
                  PaddingBottom: =8
                  PaddingLeft: =12
                  PaddingRight: =12
                  PaddingTop: =8
                  Size: =12
                  Text: ="Criar Novo"
                  Width: =(Parent.Width - 12) / 2

      - lblLivroSelecaoPlantaoStatus:
          Control: Label@2.5.1
          Properties:
            AlignInContainer: =AlignInContainer.Stretch
            Color: |-
              =If(
                  IsBlank(varPlantaoAtual),
                  ColorValue("#B7791F"),
                  ColorValue("#1F7A4D")
              )
            Fill: |-
              =If(
                  IsBlank(varPlantaoAtual),
                  ColorValue("#FFF7ED"),
                  ColorValue("#ECFDF5")
              )
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =58
            LayoutMinHeight: =16
            LayoutMinWidth: =16
            PaddingBottom: =8
            PaddingLeft: =12
            PaddingRight: =12
            PaddingTop: =8
            Size: =11
            Text: |-
              =If(
                  IsBlank(varPlantaoAtual),
                  "Nenhum Livro do Plantão carregado no momento.",
                  "Livro carregado: " &
                  Coalesce(varPlantaoAtual.CodigoPlantao, varPlantaoAtual.Title) &
                  " | Status: " &
                  Coalesce(varPlantaoAtual.StatusLivro.Value, "Status não informado")
              )
            Width: =Parent.Width - Parent.PaddingLeft - Parent.PaddingRight
