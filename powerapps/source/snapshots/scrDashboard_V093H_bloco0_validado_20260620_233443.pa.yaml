                                                LayoutMinHeight: =16
                                                LayoutMinWidth: =16
                                                OnSelect: =Set(varMenuSelecionado, "Ocorrências")
                                                PressedBorderColor: =RGBA(0, 69, 120, 1)
                                                PressedColor: =RGBA(255, 255, 255, 1)
                                                PressedFill: =RGBA(16, 110, 190, 1)
                                                RadiusBottomLeft: =0
                                                RadiusBottomRight: =0
                                                RadiusTopLeft: =0
                                                RadiusTopRight: =0
                                                Size: =12
