                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =12
                        Width: =Parent.Width
                      Children:
                        - btnCancelarFinalizacaoLivro:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Center
                              BorderColor: =ColorValue("#D6E4EC")
                              BorderThickness: =1
                              Color: =ColorValue("#374151")
                              DisplayMode: =If(varProcessandoLivroPlantao, DisplayMode.View, DisplayMode.Edit)
                              Fill: =ColorValue("#F9FAFB")
                              FillPortions: =1
                              Font: =Font.'Segoe UI'
                              FontWeight: =FontWeight.Semibold
                              Height: =46
