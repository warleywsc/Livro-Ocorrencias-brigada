                              Size: =12
                              Text: ="Cancelar"
                              Width: =(Parent.Width - 12) / 2
                        - btnConfirmarFinalizacaoLivro:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Center
                              BorderColor: =ColorValue("#1F7A4D")
                              BorderThickness: =1
                              Color: =Color.White
                              DisplayMode: =If(varProcessandoLivroPlantao, DisplayMode.View, DisplayMode.Edit)
                              Fill: =If(varProcessandoLivroPlantao, ColorValue("#9CA3AF"), ColorValue("#1F7A4D"))
                              FillPortions: =1
                              Font: =Font.'Segoe UI'
                              FontWeight: =FontWeight.Semibold
                              Height: =46
                              HoverColor: =Color.White
                              HoverFill: =ColorValue("#166534")
                              OnSelect: |-
                                =If(
                                    Coalesce(varPlantaoAtual.StatusLivro.Value, "") = "Finalizado",
                                    Notify(
                                        "Este Livro do Plantão já está finalizado.",
                                        NotificationType.Warning
                                    ),
                                    If(
                                        !varPodeFinalizarLivroPlantao,
                                        Notify(
                                            "Você não tem permissão para finalizar este Livro do Plantão.",
                                            NotificationType.Error
                                        ),
                                        If(
                                            varProcessandoLivroPlantao,
                                            Notify(
                                                "Aguarde. A finalização já está em processamento.",
                                                NotificationType.Warning
                                            ),
                                            Set(varProcessandoLivroPlantao, true);
                                            IfError(
                                                Set(
                                                    varPlantaoAtual,
                                                    Patch(
                                                        Plantoes,
                                                        LookUp(
                                                            Plantoes,
                                                            ID = varPlantaoAtual.ID
                                                        ),
                                                        {
                                                            PassagemServico: txtLivroRecebimentoPassagem.Text,
                                                            ResumoOperacional: txtLivroRecebimentoResumo.Text,
                                                            StatusViaturas: {Value: ddStatusViaturas.Selected.Value},
                                                            StatusMateriais: {Value: ddStatusMateriais.Selected.Value},
                                                            StatusGeralConferencia: {Value: ddStatusConferenciaGeral.Selected.Value},
                                                            ObservacoesConferencia: txtLivroViaturasObservacoes.Text,
                                                            StatusRondas: {Value: ddStatusRondas.Selected.Value},
                                                            StatusAreasOperacionais: {Value: ddStatusAreas.Selected.Value},
                                                            StatusAnormalidades: {Value: ddStatusAnormalidades.Selected.Value},
                                                            ObservacoesInspecaoRotina: txtLivroInspecaoObservacoes.Text,
                                                            StatusPotsRevisados: {Value: ddStatusPotsRevisados.Selected.Value},
                                                            StatusCienciaEquipePots: {Value: ddStatusCienciaEquipePots.Selected.Value},
                                                            StatusGeralPots: {Value: ddStatusGeralPots.Selected.Value},
                                                            ObservacoesPots: txtLivroPotsObservacoes.Text,
                                                            RevisaoLivro: {Value: ddRevisaoLivro.Selected.Value},
                                                            PendenciasCriticas: {Value: ddPendenciasCriticas.Selected.Value},
                                                            LiberacaoFinal: {Value: ddLiberacaoFinal.Selected.Value},
                                                            ObservacoesRevisaoFinalizacao: txtLivroRevisaoObservacoes.Text,
                                                            StatusLivro: {Value: "Finalizado"},
                                                            DataFinalizacao: Now(),
                                                            FinalizadoPor: {
                                                                '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                                                                Claims: "i:0#.f|membership|" & Lower(User().Email),
                                                                DisplayName: User().FullName,
                                                                Email: User().Email,
                                                                Department: "",
                                                                JobTitle: "",
                                                                Picture: ""
                                                            }
                                                        }
                                                    )
                                                ),
                                                Notify(
                                                    "Erro ao finalizar o Livro do Plantão: " & Coalesce(FirstError.Message, "erro não informado."),
                                                    NotificationType.Error
                                                );
                                                Set(varProcessandoLivroPlantao, false),
                                                Set(varConfirmarFinalizacaoLivroPlantao, false);
                                                Notify(
                                                    "Livro do Plantão finalizado com sucesso.",
                                                    NotificationType.Success
                                                );
                                                Set(varProcessandoLivroPlantao, false)
                                            )
                                        )
                                    )
                                )
                              Size: =12
                              Text: =If(varProcessandoLivroPlantao, "Finalizando...", "Confirmar finalização")
                              Width: =(Parent.Width - 12) / 2
      - ctnModalReaberturaLivroOverlay:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =RGBA(0, 0, 0, 0.35)
            Height: =Parent.Height
            Visible: =varConfirmarReaberturaLivroPlantao
            Width: =Parent.Width
          Children:
            - ctnModalReaberturaLivroCard:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =ColorValue("#D6E4EC")
                  BorderThickness: =1
                  Fill: =Color.White
                  Height: =430
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =12
                  LayoutOverflowY: =
                  PaddingBottom: =16
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =18
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  Width: =620
                  X: =(Parent.Width - Self.Width) / 2
                  Y: =(Parent.Height - Self.Height) / 2
                Children:
                  - lblModalReaberturaLivroTitulo:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Color: =ColorValue("#0B5F8A")
                        Font: =Font.'Segoe UI'
                        FontWeight: =FontWeight.Semibold
                        Height: =34
                        Size: =16
                        Text: ="Reabrir Livro do Plantão"
                        Width: =Parent.Width
                  - lblModalReaberturaLivroTexto:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Color: =ColorValue("#374151")
                        Font: =Font.'Segoe UI'
                        Height: =64
                        Size: =12
                        Text: ="A reabertura retornará o Livro do Plantão para Em preenchimento e liberará a edição dos campos. Informe a justificativa da reabertura."
                        Width: =Parent.Width
                  - lblModalReaberturaLivroResumo:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        BorderColor: =ColorValue("#D6E4EC")
                        BorderThickness: =1
                        Color: =ColorValue("#374151")
                        Fill: =ColorValue("#F9FAFB")
                        Font: =Font.'Segoe UI'
                        Height: =56
                        PaddingBottom: =8
                        PaddingLeft: =10
                        PaddingRight: =10
                        PaddingTop: =8
                        Size: =11
                        Text: |-
                          ="Plantão: " & Coalesce(varPlantaoAtual.CodigoPlantao, "") &
                          " | Status atual: " & Coalesce(varPlantaoAtual.StatusLivro.Value, "")
                        Width: =Parent.Width
                  - ctnModalJustificativaReaberturaLivro:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =118
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =4
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Width: =Parent.Width
                      Children:
                        - lblModalJustificativaReaberturaLivro:
                            Control: Label@2.5.1
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              Color: =ColorValue("#374151")
                              Font: =Font.'Segoe UI'
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =11
                              Text: ="Justificativa da reabertura"
                              Width: =Parent.Width
                        - txtModalJustificativaReaberturaLivro:
                            Control: Classic/TextInput@2.3.2
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              BorderColor: =ColorValue("#D6E4EC")
                              BorderThickness: =1
                              Color: =ColorValue("#1F2937")
                              Default: =""
                              DisplayMode: =If(varProcessandoLivroPlantao, DisplayMode.View, DisplayMode.Edit)
                              Fill: =ColorValue("#F9FAFB")
                              Font: =Font.'Segoe UI'
                              Height: =84
                              HintText: ="Descreva o motivo da reabertura do Livro do Plantão."
                              Mode: =TextMode.MultiLine
                              PaddingBottom: =8
                              PaddingLeft: =8
                              PaddingRight: =8
                              PaddingTop: =8
                              Size: =12
                              Width: =Parent.Width
                  - ctnModalReaberturaLivroBotoes:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =56
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =12
                        Width: =Parent.Width
                      Children:
                        - btnCancelarReaberturaLivro:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Center
                              BorderColor: =ColorValue("#D6E4EC")
                              BorderThickness: =1
                              Color: =ColorValue("#374151")
                              DisplayMode: =If(varProcessandoLivroPlantao, DisplayMode.View, DisplayMode.Edit)
                              Fill: =ColorValue("#F9FAFB")
                              FillPortions: =1
                              Font: =Font.'Segoe UI'
                              FontWeight: =FontWeight.Semibold
                              Height: =46
                              HoverColor: =ColorValue("#1F2937")
                              HoverFill: =ColorValue("#E5E7EB")
                              OnSelect: |-
                                =Set(varConfirmarReaberturaLivroPlantao, false);
                                Reset(txtModalJustificativaReaberturaLivro)
                              Size: =12
                              Text: ="Cancelar"
                              Width: =(Parent.Width - 12) / 2
                        - btnConfirmarReaberturaLivro:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Center
                              BorderColor: =ColorValue("#B7791F")
                              BorderThickness: =1
                              Color: =Color.White
                              DisplayMode: =If(varProcessandoLivroPlantao, DisplayMode.View, DisplayMode.Edit)
                              Fill: =If(varProcessandoLivroPlantao, ColorValue("#9CA3AF"), ColorValue("#B7791F"))
                              FillPortions: =1
                              Font: =Font.'Segoe UI'
                              FontWeight: =FontWeight.Semibold
                              Height: =46
                              HoverColor: =Color.White
                              HoverFill: =ColorValue("#92400E")
                              OnSelect: |-
                                =If(
                                    !varPodeReabrirLivroPlantao,
                                    Notify(
                                        "Você não tem permissão para reabrir este Livro do Plantão.",
                                        NotificationType.Error
                                    ),
                                    If(
                                        varProcessandoLivroPlantao,
                                        Notify(
                                            "Aguarde. A reabertura já está em processamento.",
                                            NotificationType.Warning
                                        ),
                                        If(
                                            Len(Trim(txtModalJustificativaReaberturaLivro.Text)) < 10,
                                            Notify(
                                                "Informe uma justificativa com pelo menos 10 caracteres para reabrir o Livro do Plantão.",
                                                NotificationType.Error
                                            ),
                                            Set(varProcessandoLivroPlantao, true);
                                            Set(
                                                varDataHoraReaberturaLivroPlantao,
                                                Now()
                                            );
                                            Set(
                                                varNumeroReaberturaLivroPlantao,
                                                Coalesce(varPlantaoAtual.QuantidadeReaberturas, 0) + 1
                                            );
                                            Set(
                                                varUsuarioReaberturaLivroPlantao,
                                                {
                                                    '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                                                    Claims: "i:0#.f|membership|" & Lower(User().Email),
                                                    DisplayName: User().FullName,
                                                    Email: User().Email,
                                                    Department: "",
                                                    JobTitle: "",
                                                    Picture: ""
                                                }
                                            );
                                            IfError(
                                                Patch(
                                                    HistoricoReaberturasPlantao,
                                                    Defaults(HistoricoReaberturasPlantao),
                                                    {
                                                        Title: "Reabertura " & Text(varNumeroReaberturaLivroPlantao) & " - " & Coalesce(varPlantaoAtual.CodigoPlantao, "Plantão " & Text(varPlantaoAtual.ID)),
                                                        PlantaoId: varPlantaoAtual.ID,
                                                        CodigoPlantao: Coalesce(varPlantaoAtual.CodigoPlantao, ""),
                                                        DataHoraReabertura: varDataHoraReaberturaLivroPlantao,
                                                        ReabertoPor: varUsuarioReaberturaLivroPlantao,
                                                        Justificativa: txtModalJustificativaReaberturaLivro.Text,
                                                        StatusAnterior: {Value: Coalesce(varPlantaoAtual.StatusLivro.Value, "")},
                                                        StatusNovo: {Value: "Em preenchimento"},
                                                        DataFinalizacaoAnterior: varPlantaoAtual.DataFinalizacao,
                                                        FinalizadoPorAnterior: If(
                                                            IsBlank(varPlantaoAtual.FinalizadoPor.Email),
                                                            Blank(),
                                                            {
                                                                '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                                                                Claims: varPlantaoAtual.FinalizadoPor.Claims,
                                                                DisplayName: varPlantaoAtual.FinalizadoPor.DisplayName,
                                                                Email: varPlantaoAtual.FinalizadoPor.Email,
                                                                Department: Coalesce(varPlantaoAtual.FinalizadoPor.Department, ""),
                                                                JobTitle: Coalesce(varPlantaoAtual.FinalizadoPor.JobTitle, ""),
                                                                Picture: Coalesce(varPlantaoAtual.FinalizadoPor.Picture, "")
                                                            }
                                                        ),
                                                        NumeroReabertura: varNumeroReaberturaLivroPlantao,
                                                        ObservacoesTecnicas: "Registro automático criado pelo Power Apps em " & Text(
                                                            varDataHoraReaberturaLivroPlantao,
                                                            "[$-pt-BR]dd/mm/yyyy hh:mm:ss"
                                                        ) & " por " & User().FullName
                                                    }
                                                ),
                                                Notify(
                                                    "Erro ao registrar o histórico da reabertura: " & Coalesce(FirstError.Message, "erro não informado."),
                                                    NotificationType.Error
                                                );
                                                Set(varProcessandoLivroPlantao, false),
                                                IfError(
                                                    Set(
                                                        varPlantaoAtual,
                                                        Patch(
                                                            Plantoes,
                                                            LookUp(
                                                                Plantoes,
                                                                ID = varPlantaoAtual.ID
                                                            ),
                                                            {
                                                                StatusLivro: {Value: "Em preenchimento"},
                                                                JustificativaReabertura: txtModalJustificativaReaberturaLivro.Text,
                                                                DataUltimaReabertura: varDataHoraReaberturaLivroPlantao,
                                                                ReabertoPorUltimo: varUsuarioReaberturaLivroPlantao,
                                                                QuantidadeReaberturas: varNumeroReaberturaLivroPlantao,
                                                                DataFinalizacao: Blank(),
                                                                FinalizadoPor: Blank()
                                                            }
                                                        )
                                                    ),
                                                    Notify(
                                                        "O histórico foi registrado, mas houve erro ao reabrir o Livro do Plantão: " & Coalesce(FirstError.Message, "erro não informado."),
                                                        NotificationType.Error
                                                    );
                                                    Set(varProcessandoLivroPlantao, false),
                                                    Set(varLivroPlantaoFinalizado, false);
                                                    Set(
                                                        varPodeEditarLivroPlantao,
                                                        varUsuarioAtualEhAdministradorOuSupervisor ||
                                                        varUsuarioAtualEhLiderAutorizadoPlantao
                                                    );
                                                    Set(
                                                        varPodeSalvarLivroPlantao,
                                                        varUsuarioAtualEhAdministradorOuSupervisor ||
                                                        varUsuarioAtualEhLiderAutorizadoPlantao
                                                    );
                                                    Set(
                                                        varPodeFinalizarLivroPlantao,
                                                        varUsuarioAtualEhAdministradorOuSupervisor ||
                                                        varUsuarioAtualEhLiderAutorizadoPlantao
                                                    );
                                                    Set(varPodeReabrirLivroPlantao, false);
                                                    Set(varConfirmarReaberturaLivroPlantao, false);
                                                    Reset(txtModalJustificativaReaberturaLivro);
                                                    Notify(
                                                        "Livro do Plantão reaberto com sucesso. Histórico da reabertura registrado.",
                                                        NotificationType.Success
                                                    );
                                                    Set(varProcessandoLivroPlantao, false)
                                                )
                                            )
                                        )
                                    )
                                )
                              Size: =12
                              Text: =If(varProcessandoLivroPlantao, "Reabrindo...", "Confirmar reabertura")
                              Width: =(Parent.Width - 12) / 2
