Screens:
  scrDashboard:
    Properties:
      Fill: =ColorValue("#F5F7FA")
      LoadingSpinnerColor: =RGBA(0, 120, 212, 1)
      OnVisible: |-
        =Refresh(Usuarios);
        Refresh(Plantoes);
        Refresh(HistoricoReaberturasPlantao);

        If(
            !IsBlank(varPlantaoAtual.ID),
            Set(
                varPlantaoAtual,
                LookUp(
                    Plantoes,
                    ID = varPlantaoAtual.ID
                )
            )
        );

        Set(
            varUsuarioAtual,
            LookUp(
                Usuarios,
                Lower(Email) = Lower(User().Email) && Ativo = true
            )
        );

        Set(
            varPerfilAcessoAtual,
            Coalesce(
                varUsuarioAtual.PerfilAcesso.Value,
                "Leitura"
            )
        );

        Set(
            varPerfilAcessoNormalizado,
            Switch(
                varPerfilAcessoAtual,
                "Administrador", "Administrador",
                "administrador", "Administrador",
                "ADMINISTRADOR", "Administrador",
                "Supervisor", "Supervisor",
                "supervisor", "Supervisor",
                "SUPERVISOR", "Supervisor",
                "Líder", "Lider",
                "Lider", "Lider",
                "lider", "Lider",
                "LIDER", "Lider",
                "Operador", "Operador",
                "operador", "Operador",
                "OPERADOR", "Operador",
                "Leitura", "Leitura",
                "leitura", "Leitura",
                "LEITURA", "Leitura",
                varPerfilAcessoAtual
            )
        );

        Set(
            varLivroPlantaoFinalizado,
            Coalesce(varPlantaoAtual.StatusLivro.Value, "") = "Finalizado"
        );

        Set(
            varUsuarioAtualEhAdministradorOuSupervisor,
            varPerfilAcessoNormalizado = "Administrador" ||
            varPerfilAcessoNormalizado = "Supervisor"
        );

        Set(
            varEmailLiderResponsavelAtualPlantao,
            Lower(
                Coalesce(
                    varPlantaoAtual.LiderResponsavelAtual.Email,
                    ""
                )
            )
        );

        Set(
            varUsuarioAtualEhLiderResponsavelPlantao,
            varEmailLiderResponsavelAtualPlantao = Lower(User().Email)
        );

        Set(
            varUsuarioAtualEhLiderAutorizadoPlantao,
            varPerfilAcessoNormalizado = "Lider" &&
            varUsuarioAtualEhLiderResponsavelPlantao
        );

        Set(
            varPodeEditarLivroPlantao,
            !varLivroPlantaoFinalizado &&
            (
                varUsuarioAtualEhAdministradorOuSupervisor ||
                varUsuarioAtualEhLiderAutorizadoPlantao
            )
        );

        Set(
            varPodeSalvarLivroPlantao,
            varPodeEditarLivroPlantao
        );

        Set(
            varPodeFinalizarLivroPlantao,
            !varLivroPlantaoFinalizado &&
            (
                varUsuarioAtualEhAdministradorOuSupervisor ||
                varUsuarioAtualEhLiderAutorizadoPlantao
            )
        );

        Set(
            varPodeReabrirLivroPlantao,
            varUsuarioAtualEhAdministradorOuSupervisor ||
            varUsuarioAtualEhLiderAutorizadoPlantao
        )
    Children:
