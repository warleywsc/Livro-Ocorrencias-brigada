                                                              Turno.Value = ddSelecaoPlantaoTurno.Selected.Value &&
                                                              PostoServico.Value = ddSelecaoPlantaoPostoServico.Selected.Value &&
                                                              Coalesce(PlantaoExtra, false) = (ddSelecaoPlantaoExtra.Selected.Value = "Sim")
                                                          )
                                                      );
                                                      If(
                                                          !IsBlank(varPlantaoLocalizado.ID),
                                                          Set(varPlantaoAtual, varPlantaoLocalizado);
                                                          Select(btnTecnicoRecalcularPermissoesPlantao);
                                                          Notify(
                                                              "Já existia um plantão com estes filtros. O plantão existente foi carregado.",
                                                              NotificationType.Information
                                                          ),
                                                          Set(
                                                              varCodigoPlantaoGerado,
                                                              "PL-" &
                                                              Text(dtpSelecaoPlantaoData.SelectedDate, "[$-en-US]yyyy-mm-dd") &
                                                              "-" &
                                                              Upper(
                                                                  Substitute(
                                                                      Substitute(
                                                                          Substitute(
                                                                              ddSelecaoPlantaoTurno.Selected.Value,
                                                                              " ",
                                                                              ""
                                                                          ),
                                                                          "ã",
                                                                          "a"
                                                                      ),
                                                                      "Ã",
                                                                      "A"
                                                                  )
                                                              ) &
                                                              "-" &
                                                              Switch(
                                                                  ddSelecaoPlantaoPostoServico.Selected.Value,
                                                                  "Brigada de Incêndio",
                                                                  "BI",
                                                                  "Angra 1",
                                                                  "A1",
                                                                  "Angra 2",
                                                                  "A2",
                                                                  "Angra 3",
                                                                  "A3",
                                                                  "POSTO"
                                                              ) &
