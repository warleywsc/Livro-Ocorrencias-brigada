                                                      )
                                                  );
                                                  If(
                                                      IsBlank(varPlantaoLocalizado.ID),
                                                      Notify(
                                                          "Nenhum plantão encontrado para os filtros informados.",
                                                          NotificationType.Warning
                                                      ),
