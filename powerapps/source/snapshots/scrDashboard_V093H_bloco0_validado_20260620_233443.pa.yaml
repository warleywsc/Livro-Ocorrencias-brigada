                        HoverFill: =RGBA(16, 110, 190, 1)
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        OnSelect: |-
                          =Reset(txtModalNovaPendenciaLocal);
                          Reset(ddModalNovaPendenciaPostoServico);
                          Reset(ddModalNovaPendenciaPrioridade);
                          Reset(txtModalNovaPendenciaDescricao);
                          Reset(txtModalNovaPendenciaObservacoes);
                          Set(varExibirModalNovaPendencia, false)
